<div class="ability-detail">
  <h2>{{ ability.name }}</h2>
  
  <div class="stats">
    <div class="stat">
      <strong>Usage Costs:</strong> {{ ability.usage_cost }}
    </div>
    <div class="stat">
      <strong>Range:</strong> {{ ability.range }}
    </div>
    <div class="stat">
      <strong>Traits:</strong> {{ ability.traits }}
    </div>
    <div class="stat">
      <strong>Ability Points:</strong> {{ ability.ability_points }}
    </div>
  </div>

  <div class="description">
    <h3>Description</h3>
    <p>{{ ability.description || 'No description available.' }}</p>
  </div>

  <div *ngIf="ability.children && ability.children.length > 0" class="children">
    <h3>Unlocks:</h3>
    <ul>
      <li *ngFor="let child of ability.children">{{ child.name }}</li>
    </ul>
  </div>

  <button (click)="close()" class="close-btn">Close</button>
</div>
